<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
</head>
<body class="bg-light">

<div class="container text-center mt-5">

    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">Welcome to the Accounting app!</h1>
        <p class="text-muted">Track your incomes and expenses easily</p>
    </div>

</div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-4 text-center">Login</h4>
               
                    <div th:if="${loginError}" class="alert alert-danger" th:text="${loginError}"></div>

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control" required />
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Login</button>
                        </div>

                        <p class="mt-3 text-center">
                            <a th:href="@{/register}">Create Account</a>
                        </p>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
