<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accounts</title>
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />
</head>
<body>
<div class="container py-4">

    <!-- Add Account -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Accounts</h2>
        <a th:href="@{/addaccount}" class="btn btn-primary">Add Account</a>
    </div>

    <!-- Total -->
    <div class="alert alert-info fw-bold">
        Total: <span th:text="${total}"></span>
    </div>

    <!-- Accounts -->
    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Spent</th>
            <th>Balance</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="acc : ${accounts}">
            <td th:text="${acc.name}"></td>
            <td th:text="${acc.description}"></td>
            <td th:text="${accountSpent[acc.account_id]}">0.00</td>
            <td th:text="${acc.amount}">0.00</td>
            <td>
                <!-- Delete (if possible, there should not be Entries or any Transfers) -->
                <a th:if="${acc.entries.empty} and ${acc.fromTransfers.empty} and ${acc.toTransfers.empty}"
                   th:href="@{/deleteaccount/{id}(id=${acc.account_id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this account?');">Delete
                </a>
                
                <!-- Transfer -->
                <a th:href="@{/transfer/{toId}(toId=${acc.account_id})}"
                   class="btn btn-warning btn-sm ms-1">
                   Transfer
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Back to Entries -->
    <div class="mt-3">
        <a th:if="${type != null}" th:href="@{/entries(type=${type})}" class="btn btn-secondary">Back to Entries</a>
        <a th:if="${type == null}" th:href="@{/entries}" class="btn btn-secondary">Back to Entries</a>
    </div>

</div>
</body>
</html>
