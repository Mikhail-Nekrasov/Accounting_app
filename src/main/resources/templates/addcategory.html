<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Category</title>
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
</head>
<body class="bg-light">

<div class="container my-4">
    <div class="card shadow-sm">
        <div class="card-body">
            <h3 class="mb-3">Add Category</h3>

            <form th:action="@{/addcategory}" th:object="${category}" method="post">
                <input type="hidden" th:field="*{type}" />

                <div class="mb-3">
                    <label class="form-label fw-bold">Name</label>
                    <input type="text" th:field="*{name}" class="form-control" required />
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Type</label>
                    <input type="text" class="form-control" th:value="${category.type}" readonly />
                </div>

                <input type="hidden" name="returnUrl" th:value="${returnUrl}" />

                <div class="d-flex justify-content-between">
                    <button type="submit" class="btn btn-primary">Save</button>
                    <a th:href="${returnUrl}" class="btn btn-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>
</div>

</body>
</html>
