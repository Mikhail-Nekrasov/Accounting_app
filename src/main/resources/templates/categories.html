<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${type == null ? 'All categories' : type.name() + ' categories'}">Categories</title>
    <link type="text/css" rel="stylesheet" href="/css/bootstrap.min.css" th:href="@{/css/bootstrap.min.css}" />
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<div class="container py-4">

    <!-- Заголовок + Add Category кнопка -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${type == null ? 'All categories' : type.name() + ' categories'}"></h2>
        <a th:href="@{/addcategory(returnUrl=${currentUrl}, entryType=${type})}" class="btn btn-primary">
            Add category
        </a>
    </div>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.name}"></td>
            <td th:text="${category.type}"></td>
            <td>
                <!-- Delete доступен только для пустых категорий -->
                <a th:if="${category.entries == null or #lists.isEmpty(category.entries)}"
                   th:href="@{/deletecategory/{id}(id=${category.category_id}, type=${type})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('Are you sure you want to delete this category?');">
                   Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Кнопка возврата на список записей того же типа -->
    <div class="mt-3">
        <a th:if="${type != null}" th:href="@{/entries(type=${type})}" class="btn btn-secondary">Back to Entries</a>
        <a th:if="${type == null}" th:href="@{/entries}" class="btn btn-secondary">Back to Entries</a>
    </div>

</div>
</body>
</html>
