<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
</head>
<body class="bg-light">

<div class="container text-center mt-5">

    <div class="text-center mb-5">
        <h1 class="display-4 fw-bold">Welcome to the Accounting app!</h1>
        <p class="text-muted">Track your incomes and expenses easily</p>
    </div>

</div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">

            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-4 text-center">Create Account</h4>

                    <div th:if="${usernameError}" class="alert alert-danger" th:text="${usernameError}"></div>
                    <div th:if="${passwordError}" class="alert alert-danger" th:text="${passwordError}"></div>

                    <form th:action="@{/register}" th:object="${userForm}" method="post">

                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input th:field="*{username}" id="username" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input th:field="*{password}" id="password" type="password" class="form-control" required />
                        </div>

                        <div class="mb-3">
                            <label for="passwordConfirm" class="form-label">Confirm Password</label>
                            <input th:field="*{passwordConfirm}" id="passwordConfirm" type="password" class="form-control" required />
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Create Account</button>
                        </div>

                        <p class="mt-3 text-center">
                            <a th:href="@{/login}">Back to Login</a>
                        </p>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
