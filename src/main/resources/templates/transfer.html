<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Transfer Money</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<body class="bg-light">

<div class="container my-4">
    <div class="card shadow-sm rounded-3 p-4">
        <h3 class="mb-4">Transfer Money</h3>

        <!-- Errors -->
        <div th:if="${error == 'same'}" class="alert alert-danger">
            You cannot transfer money to the same account.
        </div>

        <div th:if="${error == 'invalid'}" class="alert alert-danger">
            Amount must be greater than zero.
        </div>

        <div th:if="${error == 'nomoney'}" class="alert alert-danger">
            Not enough funds in the source account.
        </div>

        <form th:action="@{/transfer}" method="post">

            <!-- FROM -->
            <div class="mb-3">
                <label class="form-label">From account</label>
                <select class="form-select" name="fromId" required>
                    <option th:each="acc : ${accounts}"
                            th:value="${acc.account_id}"
                            th:text="|${acc.name} (Balance: ${balances[acc.account_id]})|">
                    </option>
                </select>
            </div>

            <!-- TO -->
            <div class="mb-3">
                <label class="form-label">To account</label>
                <select class="form-select" name="toId" required>

                    <!-- Preselected destination -->
                    <option th:value="${toAccount.account_id}"
                            th:text="|${toAccount.name} (Balance: ${balances[toAccount.account_id]})|"
                            selected>
                    </option>

                    <!-- Other accounts -->
                    <option th:each="acc : ${accounts}"
                            th:if="${acc.account_id} != ${toAccount.account_id}"
                            th:value="${acc.account_id}"
                            th:text="|${acc.name} (Balance: ${balances[acc.account_id]})|">
                    </option>

                </select>
            </div>

            <!-- AMOUNT -->
            <div class="mb-3">
                <label class="form-label">Amount</label>
                <input type="number"
                       class="form-control"
                       name="amount"
                       min="0.01"
                       step="0.01"
                       required>
            </div>

            <!-- DESCRIPTION -->
            <div class="mb-3">
                <label class="form-label">Description (optional)</label>
                <input type="text" class="form-control" name="description">
            </div>

            <button type="submit" class="btn btn-primary">Transfer money</button>
            <a href="/accounts" class="btn btn-secondary ms-2">Back to Accounts</a>

        </form>
    </div>
</div>

</body>
</html>
